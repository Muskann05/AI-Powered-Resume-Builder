spring.application.name=auth-service
server.port=8081

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=jdbc:mysql://localhost:3306/resumeai_auth
spring.datasource.username=root
spring.datasource.password=Muskan@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

spring.security.oauth2.client.registration.linkedin.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.linkedin.redirect-uri=http://localhost:8080/login/oauth2/code/linkedin
spring.security.oauth2.client.registration.linkedin.scope=openid,profile,email
spring.security.oauth2.client.registration.linkedin.client-name=LinkedIn

spring.security.oauth2.client.provider.linkedin.issuer-uri=https://www.linkedin.com/oauth


app.jwt.access-token-expiration-ms=86400000
app.jwt.refresh-token-expiration-ms=604800000

app.oauth2.redirect-url=http://localhost:4200/oauth-success
app.frontend.reset-password-url=http://localhost:4200/reset-password


spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

razorpay.base-url=https://api.razorpay.com/v1
app.payment.provider=razorpay
app.payment.premium.amount=49900
app.payment.currency=INR

notification.service.name=notification-service

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Import Secret File
spring.config.import=optional:file:./src/main/resources/application-secrets.properties
