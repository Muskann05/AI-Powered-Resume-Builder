spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=20s

spring.cloud.gateway.discovery.locator.enabled=false

service.auth.uri=lb://auth-service
service.resume.uri=lb://resume-service
service.section.uri=lb://section-service
service.ai.uri=lb://ai-service
service.template.uri=lb://template-service
service.export.uri=lb://export-service
service.notification.uri=lb://notification-service
service.jobmatch.uri=lb://jobmatch-service

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${service.auth.uri}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/oauth2/**,/login/**,/api/auth/**,/api/oauth2/**,/api/login/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=(?:/api)?/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[1].id=resume-service
spring.cloud.gateway.routes[1].uri=${service.resume.uri}
spring.cloud.gateway.routes[1].predicates[0]=Path=/resumes/**,/api/resumes/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=(?:/api)?/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[2].id=section-service
spring.cloud.gateway.routes[2].uri=${service.section.uri}
spring.cloud.gateway.routes[2].predicates[0]=Path=/sections/**,/api/sections/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=(?:/api)?/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[3].id=ai-service
spring.cloud.gateway.routes[3].uri=${service.ai.uri}
spring.cloud.gateway.routes[3].predicates[0]=Path=/ai/**,/api/ai/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=(?:/api)?/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[4].id=template-service
spring.cloud.gateway.routes[4].uri=${service.template.uri}
spring.cloud.gateway.routes[4].predicates[0]=Path=/templates/**,/api/templates/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=(?:/api)?/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[5].id=export-service
spring.cloud.gateway.routes[5].uri=${service.export.uri}
spring.cloud.gateway.routes[5].predicates[0]=Path=/exports/**,/api/exports/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=(?:/api)?/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=${service.notification.uri}
spring.cloud.gateway.routes[6].predicates[0]=Path=/notifications/**,/api/notifications/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=(?:/api)?/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[7].id=jobmatch-service
spring.cloud.gateway.routes[7].uri=${service.jobmatch.uri}
spring.cloud.gateway.routes[7].predicates[0]=Path=/job-matches/**,/api/job-matches/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=(?:/api)?/(?<segment>.*), /$\{segment}
