spring.application.name=api-gateway
server.port=${PORT:8080}

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=${EUREKA_CLIENT_REGISTER_WITH_EUREKA:false}
eureka.client.fetch-registry=${EUREKA_CLIENT_FETCH_REGISTRY:false}

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

spring.cloud.gateway.httpclient.connect-timeout=${GATEWAY_CONNECT_TIMEOUT:5000}
spring.cloud.gateway.httpclient.response-timeout=${GATEWAY_RESPONSE_TIMEOUT:20s}

spring.cloud.gateway.discovery.locator.enabled=false

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=https://resumeai-frontend-06sa.onrender.com
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true


service.auth.uri=${AUTH_SERVICE_URI:http://localhost:8081}
service.resume.uri=${RESUME_SERVICE_URI:http://localhost:8082}
service.section.uri=${SECTION_SERVICE_URI:http://localhost:8083}
service.template.uri=${TEMPLATE_SERVICE_URI:http://localhost:8085}

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${service.auth.uri}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/oauth2/**,/login/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[1].id=resume-service
spring.cloud.gateway.routes[1].uri=${service.resume.uri}
spring.cloud.gateway.routes[1].predicates[0]=Path=/resumes/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/resumes/?(?<segment>.*), /resumes/${segment}

spring.cloud.gateway.routes[2].id=section-service
spring.cloud.gateway.routes[2].uri=${service.section.uri}
spring.cloud.gateway.routes[2].predicates[0]=Path=/sections/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/sections/?(?<segment>.*), /sections/${segment}

spring.cloud.gateway.routes[3].id=template-service
spring.cloud.gateway.routes[3].uri=${service.template.uri}
spring.cloud.gateway.routes[3].predicates[0]=Path=/templates/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/templates/?(?<segment>.*), /templates/${segment}
