spring.application.name=jobmatch-service
server.port=8089

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:mysql://localhost:3306/resumeai_jobmatch
spring.datasource.username=root
spring.datasource.password=Muskan@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

auth.service.name=auth-service
resume.service.name=resume-service
section.service.name=section-service
ai.service.name=ai-service
notification.service.name=notification-service

linkedin.api.base-url=https://api.linkedin.example.com
linkedin.api.search-path=/jobs/search
linkedin.api.key=replace-with-linkedin-key
linkedin.api.default-limit=10
linkedin.api.provider=dummy
linkedin.api.fallback-enabled=true

jobmatch.notification.threshold=75

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
