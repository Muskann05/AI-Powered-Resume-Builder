spring.application.name=export-service
server.port=8086

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:mysql://localhost:3306/resumeai_export
spring.datasource.username=root
spring.datasource.password=Muskan@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

auth.service.name=auth-service
resume.service.name=resume-service
section.service.name=section-service
template.service.name=template-service

export.processing.mode=sync
export.local-temp-dir=./runtime/export-temp
export.local-storage-dir=./runtime/export-storage
export.file-expiry-days=7

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
